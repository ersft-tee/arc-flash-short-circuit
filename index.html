<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arc Flash &amp; Short Circuit Calculator</title>
<style>
/* ── Variables ─────────────────────────────────────────────────────────── */
:root {
  --bg:       #0f1117;
  --bg-card:  #13151c;
  --bg-input: #0d1117;
  --bg-code:  #1a1f2e;
  --border:   #1e293b;
  --border2:  #334155;
  --text:     #e2e8f0;
  --text2:    #94a3b8;
  --text3:    #475569;
  --amber:    #f59e0b;
  --amber-d:  #d97706;
  --amber-bg: rgba(245,158,11,.10);
  --amber-br: rgba(245,158,11,.20);
  --green:    #10b981;
  --green-bg: rgba(16,185,129,.10);
  --green-br: rgba(16,185,129,.20);
  --red:      #ef4444;
  --red-bg:   rgba(239,68,68,.10);
  --red-br:   rgba(239,68,68,.20);
  --orange:   #f97316;
  --orange-bg:rgba(249,115,22,.10);
  --yellow:   #eab308;
  --yellow-bg:rgba(234,179,8,.10);
  --blue-bg:  rgba(59,130,246,.06);
  --blue-br:  rgba(59,130,246,.20);
  --blue:     #60a5fa;
  --sidebar-w:220px;
  --mono: 'JetBrains Mono','Cascadia Code','Fira Code',Consolas,'Courier New',monospace;
}
/* ── Reset ──────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;overflow:hidden;height:100svh}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select{font:inherit}
a{color:inherit}
table{border-collapse:collapse;width:100%}
/* ── App Shell ──────────────────────────────────────────────────────────── */
#app{display:flex;height:100svh;overflow:hidden}
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;overflow:hidden;transition:transform .2s}
#wrapper{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
#main{flex:1;overflow-y:auto;padding:1.25rem 1.5rem}
/* ── Loading ────────────────────────────────────────────────────────────── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .3s}
.bolt{width:5rem;height:6rem;position:relative;margin-bottom:2rem}
.bolt svg{width:100%;height:100%}
.bolt::before{content:'';position:absolute;inset:-50%;background:radial-gradient(ellipse,rgba(245,158,11,.3),transparent 70%);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.load-title{font-size:1.375rem;font-weight:700;color:var(--amber);letter-spacing:.1em;margin-bottom:.25rem}
.load-sub{font-size:.75rem;color:var(--text3);letter-spacing:.15em;margin-bottom:2.5rem}
.load-bar-track{width:18rem;height:4px;background:var(--border);border-radius:9999px;overflow:hidden;margin-bottom:.75rem}
.load-bar-fill{height:100%;background:linear-gradient(90deg,var(--amber-d),var(--amber));border-radius:9999px;transition:width .3s}
.load-phase{font-size:.7rem;color:var(--text3);font-family:var(--mono)}
/* ── Sidebar ────────────────────────────────────────────────────────────── */
.sb-logo{display:flex;align-items:center;gap:.625rem;padding:1rem;border-bottom:1px solid var(--border)}
.sb-icon{background:var(--amber);border-radius:4px;width:1.5rem;height:1.5rem;display:flex;align-items:center;justify-content:center;font-size:.875rem;color:var(--bg);flex-shrink:0}
.sb-name{font-size:.6875rem;font-weight:700;color:var(--amber);line-height:1.2}
.sb-sub{font-size:.5625rem;color:var(--text3);line-height:1.2}
.sb-nav{flex:1;overflow-y:auto;padding:.5rem 0}
.sb-nav::-webkit-scrollbar{width:4px}
.sb-nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sb-section{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:.5rem 1rem .25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.sb-section:hover{color:var(--text2)}
.sb-item{display:flex;align-items:center;gap:.5rem;width:100%;padding:.4375rem 1rem;font-size:.75rem;color:var(--text2);border-left:2px solid transparent;transition:all .15s;text-align:left}
.sb-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.sb-item.active{background:var(--amber-bg);color:var(--amber);border-left-color:var(--amber);font-weight:600}
.sb-item .ic{font-size:.875rem;flex-shrink:0;width:1rem;text-align:center}
.sb-badge{margin-left:auto;background:var(--amber-bg);color:var(--amber);font-size:.5625rem;font-family:var(--mono);padding:.125rem .4rem;border-radius:9999px;border:1px solid var(--amber-br)}
.sb-foot{padding:.75rem 1rem;border-top:1px solid var(--border);font-size:.5625rem;color:var(--text3);line-height:1.6}
/* ── Topbar ─────────────────────────────────────────────────────────────── */
.tb-status{display:flex;align-items:center;gap:.5rem;font-size:.625rem;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.tb-dot{width:.375rem;height:.375rem;border-radius:50%;background:var(--amber);animation:pulse 2s ease-in-out infinite}
.tb-right{font-size:.625rem;font-family:var(--mono);color:var(--text3)}
.ham{display:none;padding:.25rem;color:var(--text2);font-size:1.25rem}
/* ── Section header ──────────────────────────────────────────────────────── */
.page-header{display:flex;align-items:flex-start;gap:.75rem;margin-bottom:1.5rem}
.page-icon{background:var(--amber-bg);border:1px solid var(--amber-br);border-radius:.5rem;width:2.25rem;height:2.25rem;display:flex;align-items:center;justify-content:center;font-size:1.125rem;flex-shrink:0}
.page-title{font-size:1.0625rem;font-weight:700;color:var(--text)}
.page-sub{font-size:.6875rem;color:var(--text3);margin-top:.125rem}
/* ── Layout helpers ──────────────────────────────────────────────────────── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.stack{display:flex;flex-direction:column;gap:1rem}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
/* ── Cards ───────────────────────────────────────────────────────────────── */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:.75rem;padding:1rem}
.card-title{font-size:.6875rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.875rem;display:flex;align-items:center;justify-content:space-between}
/* ── Form elements ───────────────────────────────────────────────────────── */
.fg{display:flex;flex-direction:column;gap:.25rem}
.fg label,.fg .lbl{font-size:.6875rem;font-weight:600;color:var(--text2);display:flex;justify-content:space-between}
.hint{font-size:.5625rem;color:var(--text3);font-weight:400}
.iw{display:flex}
.iw input,.iw select{flex:1;background:var(--bg-input);border:1px solid var(--border);color:var(--text);padding:.4375rem .75rem;font-size:.8125rem;outline:none;transition:border-color .15s}
.iw input:focus,.iw select:focus{border-color:var(--amber)}
.iw input.ur{border-radius:.375rem 0 0 .375rem}
.iw input.full,.iw select.full{border-radius:.375rem}
.iw .unit{background:var(--bg-code);border:1px solid var(--border);border-left:none;padding:.4375rem .625rem;font-size:.6875rem;color:var(--text3);border-radius:0 .375rem .375rem 0;white-space:nowrap;display:flex;align-items:center}
select.full{width:100%;background:var(--bg-input);border:1px solid var(--border);color:var(--text);padding:.4375rem .75rem;font-size:.8125rem;border-radius:.375rem;outline:none;transition:border-color .15s}
select.full:focus{border-color:var(--amber)}
select option{background:var(--bg-card)}
/* ── Toggle ─────────────────────────────────────────────────────────────── */
.tog{display:flex;align-items:center;justify-content:space-between;gap:.75rem;cursor:pointer;user-select:none}
.tog-text .tog-label{font-size:.6875rem;font-weight:600;color:var(--text2)}
.tog-text .tog-hint{font-size:.5625rem;color:var(--text3)}
.tog-track{position:relative;width:2.5rem;height:1.25rem;background:var(--border2);border-radius:9999px;flex-shrink:0;transition:background .2s}
.tog-track.on{background:var(--amber)}
.tog-thumb{position:absolute;top:.125rem;left:.125rem;width:1rem;height:1rem;background:#fff;border-radius:50%;transition:transform .2s}
.tog-track.on .tog-thumb{transform:translateX(1.25rem)}
/* ── Result rows ──────────────────────────────────────────────────────────── */
.rr{display:flex;align-items:center;justify-content:space-between;padding:.4375rem 0;border-bottom:1px solid rgba(30,41,59,.6)}
.rr:last-child{border-bottom:none}
.rr .rl{font-size:.6875rem;color:var(--text3)}
.rr .rv{font-family:var(--mono);font-weight:700;font-size:.8125rem;color:var(--amber);display:flex;align-items:center;gap:.3rem}
.rr .rv.green{color:var(--green)}
.rr .rv.red{color:var(--red)}
.rr .rv.amber{color:var(--amber)}
.rr .rv.gray{color:var(--text2)}
.rv-unit{font-size:.5625rem;color:var(--text3);font-family:system-ui;font-weight:400}
/* ── Big result ───────────────────────────────────────────────────────────── */
.big-result{margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)}
.big-result-label{font-size:.625rem;color:var(--text3);margin-bottom:.25rem}
.big-result-value{font-family:var(--mono);font-size:2rem;font-weight:700;color:var(--amber);line-height:1}
.big-result-value .big-unit{font-size:1rem;color:var(--amber-d);margin-left:.25rem}
.big-result-value.green{color:var(--green)}
.big-result-value.red{color:var(--red)}
.big-result-sub{font-size:.5625rem;color:var(--text3);margin-top:.25rem}
/* ── Badges ──────────────────────────────────────────────────────────────── */
.badge{display:inline-flex;font-size:.5625rem;font-weight:700;padding:.125rem .5rem;border-radius:9999px;border:1px solid;white-space:nowrap}
.badge.green{background:var(--green-bg);color:var(--green);border-color:var(--green-br)}
.badge.red{background:var(--red-bg);color:var(--red);border-color:var(--red-br)}
.badge.amber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-br)}
.badge.orange{background:var(--orange-bg);color:var(--orange);border-color:rgba(249,115,22,.25)}
.badge.gray{background:rgba(100,116,139,.1);color:var(--text2);border-color:var(--border2)}
/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn-save{background:rgba(51,65,85,.5);border:1px solid var(--border2);color:var(--text2);font-size:.6875rem;padding:.3125rem .75rem;border-radius:.375rem;transition:all .15s}
.btn-save:hover{background:var(--border2);color:var(--text)}
.btn-export{background:var(--amber-bg);border:1px solid var(--amber-br);color:var(--amber);font-size:.6875rem;font-weight:600;padding:.3125rem .75rem;border-radius:.375rem;transition:all .15s}
.btn-export:hover{background:rgba(245,158,11,.2)}
.btn-row{display:flex;gap:.5rem;justify-content:flex-end;margin-top:.5rem}
/* ── Preset chips ──────────────────────────────────────────────────────────── */
.chips{display:flex;flex-wrap:wrap;gap:.375rem;margin-bottom:1.25rem}
.chip{font-size:.6875rem;padding:.25rem .625rem;border-radius:.375rem;border:1px solid var(--border);background:rgba(30,41,59,.5);color:var(--text2);transition:all .15s}
.chip:hover{border-color:rgba(245,158,11,.4);color:var(--amber)}
.chip.active{background:var(--amber);border-color:var(--amber);color:#000;font-weight:700}
.chip-sm{font-size:.5625rem;padding:.1875rem .5rem}
/* ── Info boxes ───────────────────────────────────────────────────────────── */
.info{border:1px solid;border-radius:.5rem;padding:.625rem .875rem;font-size:.6875rem;line-height:1.6;margin-top:.25rem}
.info.blue{background:var(--blue-bg);border-color:var(--blue-br);color:var(--blue)}
.info.amber{background:var(--amber-bg);border-color:var(--amber-br);color:var(--amber)}
.info.red{background:var(--red-bg);border-color:var(--red-br);color:var(--red)}
/* ── Progress bar ─────────────────────────────────────────────────────────── */
.vd-bar{height:.5rem;background:var(--border);border-radius:9999px;overflow:hidden;margin-top:.75rem}
.vd-bar-fill{height:100%;border-radius:9999px;transition:width .3s}
.vd-bar-fill.green{background:var(--green)}
.vd-bar-fill.red{background:var(--red)}
/* ── PPE banner ───────────────────────────────────────────────────────────── */
.ppe-banner{border:1px solid;border-radius:.75rem;padding:1rem}
.ppe-banner.cat0{background:var(--green-bg);border-color:rgba(16,185,129,.3)}
.ppe-banner.cat1{background:var(--yellow-bg);border-color:rgba(234,179,8,.3)}
.ppe-banner.cat2{background:var(--orange-bg);border-color:rgba(249,115,22,.3)}
.ppe-banner.cat3,.ppe-banner.cat4,.ppe-banner.cat5{background:var(--red-bg);border-color:rgba(239,68,68,.3)}
.ppe-cat-num{font-size:2.5rem;font-family:var(--mono);font-weight:900;line-height:1}
.cat0 .ppe-cat-num,.cat0 .ppe-cat-label{color:var(--green)}
.cat1 .ppe-cat-num,.cat1 .ppe-cat-label{color:var(--yellow)}
.cat2 .ppe-cat-num,.cat2 .ppe-cat-label{color:var(--orange)}
.cat3 .ppe-cat-num,.cat3 .ppe-cat-label,.cat4 .ppe-cat-num,.cat4 .ppe-cat-label,.cat5 .ppe-cat-num,.cat5 .ppe-cat-label{color:var(--red)}
.ppe-cat-label{font-size:.75rem;font-weight:700}
.ppe-cat-range{font-size:.625rem;color:var(--text3);margin-top:.125rem}
.ppe-cat-head{display:flex;align-items:center;gap:.875rem;margin-bottom:.875rem}
.ppe-item{display:flex;gap:.375rem;font-size:.6875rem;color:var(--text2);margin-bottom:.25rem}
.ppe-item-dot{margin-top:.25rem;font-size:.5rem;flex-shrink:0}
.ppe-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.875rem}
/* ── Tables ───────────────────────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:.75rem}
table.ref{background:var(--bg-card);min-width:500px}
table.ref th{text-align:left;font-size:.5625rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:.625rem .75rem;border-bottom:1px solid var(--border);white-space:nowrap}
table.ref td{padding:.5625rem .75rem;border-bottom:1px solid rgba(30,41,59,.5);font-size:.6875rem;color:var(--text2);vertical-align:middle}
table.ref tr:last-child td{border-bottom:none}
table.ref tr:hover td{background:rgba(255,255,255,.02)}
.td-mono{font-family:var(--mono);font-weight:700;color:var(--amber);font-size:.6875rem}
.td-name{font-weight:600;color:var(--text);font-size:.6875rem}
.td-muted{font-size:.5625rem;color:var(--text3)}
.ratings-wrap{display:flex;flex-wrap:wrap;gap:.25rem}
.rating-chip{background:var(--amber-bg);border:1px solid var(--amber-br);color:var(--amber);font-size:.5625rem;font-family:var(--mono);font-weight:700;padding:.125rem .375rem;border-radius:.25rem}
/* ── Reference section headers ────────────────────────────────────────────── */
.ref-intro{font-size:.6875rem;color:var(--text3);line-height:1.6;margin-bottom:1rem}
.ref-note{font-size:.5625rem;color:var(--text3);margin-top:.5rem;line-height:1.5}
.approach-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-bottom:1rem}
.approach-card{border:1px solid;border-radius:.5rem;padding:.75rem;font-size:.6875rem}
.approach-card.yellow{background:var(--yellow-bg);border-color:rgba(234,179,8,.25)}
.approach-card.orange{background:var(--orange-bg);border-color:rgba(249,115,22,.25)}
.approach-card.red{background:var(--red-bg);border-color:rgba(239,68,68,.25)}
.approach-card-title{font-weight:700;margin-bottom:.25rem}
.approach-card.yellow .approach-card-title{color:var(--yellow)}
.approach-card.orange .approach-card-title{color:var(--orange)}
.approach-card.red .approach-card-title{color:var(--red)}
.approach-card-desc{color:var(--text3);font-size:.5625rem;line-height:1.5}
.device-two{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:1rem}
.device-card{background:var(--bg-card);border:1px solid var(--border);border-radius:.75rem;padding:.75rem}
.device-card-title{font-size:.6875rem;font-weight:700;color:var(--text2);margin-bottom:.5rem}
.device-item{display:flex;gap:.375rem;font-size:.5625rem;color:var(--text3);margin-bottom:.25rem}
.device-dot{color:var(--amber-d);margin-top:.125rem}
.type-pill{font-size:.5rem;font-weight:700;padding:.125rem .375rem;border-radius:.25rem;border:1px solid;display:inline-block}
.type-pill.fuse{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-br)}
.type-pill.breaker{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-br)}
.type-pill.relay{background:rgba(167,139,250,.1);color:#a78bfa;border-color:rgba(167,139,250,.2)}
.type-pill.recloser{background:var(--green-bg);color:var(--green);border-color:var(--green-br)}
.td-inst{color:var(--green);font-family:var(--mono);font-size:.5625rem}
.td-st{color:var(--yellow);font-family:var(--mono);font-size:.5625rem}
.td-lt{color:var(--orange);font-family:var(--mono);font-size:.5625rem}
.td-none{color:var(--text3);font-size:.5625rem}
/* ── Saved calculations ───────────────────────────────────────────────────── */
.saved-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.saved-count{font-size:.6875rem;color:var(--text3)}
.saved-empty{text-align:center;padding:4rem 2rem;color:var(--text3)}
.saved-empty-icon{font-size:2.5rem;opacity:.2;margin-bottom:1rem}
.saved-card{background:var(--bg-card);border:1px solid var(--border);border-radius:.75rem;overflow:hidden;margin-bottom:.75rem}
.saved-card-head{display:flex;align-items:center;justify-content:space-between;padding:.625rem 1rem}
.saved-card-meta{display:flex;align-items:center;gap:.625rem;min-width:0;flex:1}
.saved-card-date{font-size:.5625rem;color:var(--text3);white-space:nowrap}
.saved-card-actions{display:flex;gap:.25rem;flex-shrink:0;margin-left:.75rem}
.saved-card-actions button{font-size:.6875rem;padding:.25rem .5rem;border-radius:.3rem;transition:all .15s}
.btn-pdf{color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber-br)}
.btn-pdf:hover{background:rgba(245,158,11,.2)}
.btn-del{color:var(--text3);background:transparent;border:1px solid transparent}
.btn-del:hover{color:var(--red);background:var(--red-bg);border-color:var(--red-br)}
.btn-expand{color:var(--text3);background:transparent;border:1px solid transparent;font-size:.75rem}
.btn-expand:hover{background:var(--border)}
.saved-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:.625rem;padding:0 1rem .875rem}
.metric{background:rgba(51,65,85,.4);border-radius:.5rem;padding:.5rem .625rem}
.metric-lbl{font-size:.5625rem;color:var(--text3);margin-bottom:.125rem}
.metric-val{font-family:var(--mono);font-weight:700;font-size:.8125rem;color:var(--text)}
.metric-val.amber{color:var(--amber)}
.metric-val.green{color:var(--green)}
.metric-val.red{color:var(--red)}
.saved-detail{border-top:1px solid var(--border);padding:.875rem 1rem}
.saved-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.saved-detail-section{font-size:.5625rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:.5rem}
.saved-detail-row{display:flex;justify-content:space-between;font-size:.5625rem;margin-bottom:.2rem}
.saved-detail-key{color:var(--text3)}
.saved-detail-val{font-family:var(--mono);color:var(--amber)}
/* ── PPE ref cards ────────────────────────────────────────────────────────── */
.ppe-ref-card{border:1px solid;border-radius:.75rem;padding:1rem;margin-bottom:.75rem}
.ppe-ref-card.c1{background:rgba(234,179,8,.06);border-color:rgba(234,179,8,.2)}
.ppe-ref-card.c2{background:rgba(249,115,22,.06);border-color:rgba(249,115,22,.2)}
.ppe-ref-card.c3,.ppe-ref-card.c4{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.25)}
.ppe-ref-num{font-size:3rem;font-family:var(--mono);font-weight:900;line-height:1}
.ppe-ref-head{display:flex;align-items:center;gap:1rem;margin-bottom:1rem}
.ppe-ref-title{font-size:.875rem;font-weight:700}
.ppe-ref-range{font-size:.625rem;color:var(--text3)}
.c1 .ppe-ref-num,.c1 .ppe-ref-title{color:var(--yellow)}
.c2 .ppe-ref-num,.c2 .ppe-ref-title{color:var(--orange)}
.c3 .ppe-ref-num,.c3 .ppe-ref-title,.c4 .ppe-ref-num,.c4 .ppe-ref-title{color:var(--red)}
.ppe-ref-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.875rem}
.ppe-ref-col-title{font-size:.5625rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:.5rem}
.ppe-ref-item{display:flex;gap:.375rem;font-size:.5625rem;color:var(--text2);margin-bottom:.25rem;line-height:1.4}
/* ── Responsive ───────────────────────────────────────────────────────────── */

// ═══════════════════════════════════════════════════════════════════════
// CALCULATIONS
// ═══════════════════════════════════════════════════════════════════════

function calcXfmr({kva,vPrimary,vSecondary,zPercent,phases,useUtility,utilityFaultKA}) {
  const Z = zPercent/100, s = Math.sqrt(3);
  const flaS = phases===3 ? kva*1000/(s*vSecondary) : kva*1000/vSecondary;
  const flaP = phases===3 ? kva*1000/(s*vPrimary)   : kva*1000/vPrimary;
  const iscInf = flaS/Z;
  let iscUtil = null;
  if (useUtility && utilityFaultKA>0) {
    const mva = s*(vPrimary/1000)*utilityFaultKA;
    iscUtil = flaS/((kva/1000/mva)+Z);
  }
  return {flaS,flaP,iscInfKA:iscInf/1000,iscUtilKA:iscUtil?iscUtil/1000:null,iscKA:(iscUtil??iscInf)/1000};
}

function calcCable({size,material,conduit,lengthFt,loadAmps,voltage,phases,pf}) {
  const ri = material==='copper'?(conduit==='steel'?R[size]?.[0]:R[size]?.[1]):(conduit==='steel'?R[size]?.[2]:R[size]?.[3]);
  const xi = conduit==='steel'?X[size]?.[0]:X[size]?.[1];
  if (ri==null||xi==null) return null;
  const rT=ri*lengthFt/1000, xT=xi*lengthFt/1000;
  const zT=Math.sqrt(rT*rT+xT*xT);
  const sin=Math.sin(Math.acos(pf));
  const vdPer=loadAmps*(rT*pf+xT*sin);
  const vdT=phases===1?2*vdPer:Math.sqrt(3)*vdPer;
  return {ri,xi,rT,xT,zT,vdT,vdPct:vdT/voltage*100,amp:material==='copper'?CU_AMP[size]:AL_AMP[size]};
}

function calcMotor({hp,voltage,efficiency,pf,phases,multiplier}) {
  const fla=phases===3?(hp*746/(Math.sqrt(3)*voltage*efficiency*pf)):(hp*746/(voltage*efficiency*pf));
  const c=fla*multiplier;
  return {fla,cA:c,cKA:c/1000};
}

function calcArc({ibfKA,voltageKV,gapMM,durationCycles,workingDistanceIn,config,grounded}) {
  const Ibf=ibfKA,V=voltageKV,G=gapMM,t=durationCycles/60,D=workingDistanceIn*25.4;
  const K1=config==='box'?-.555:-.792, K2=grounded?-.113:0;
  const lnIa=K1+K2+.662*Math.log(Ibf)+.0966*V+.000526*G+.5588*V*Math.log(Ibf)-.00304*G*Math.log(Ibf);
  const Ia=Math.exp(lnIa);
  const lnEn=K1+K2+1.081*Math.log(Ia)+.0011*G;
  const En=Math.exp(lnEn);
  const x=config==='box'?(V<=1?1.473:.973):2.0;
  const Cf=V<=1?1.5:1.0;
  const E=4.184*Cf*En*(t/.2)*Math.pow(610/D,x);
  const afbMM=Math.pow((4.184*Cf*En*(t/.2)*Math.pow(610,x))/1.2,1/x);
  const cat=E<1.2?0:E<=4?1:E<=8?2:E<=25?3:E<=40?4:5;
  return {Ia,E,afbFt:afbMM/25.4/12,afbIn:afbMM/25.4,cat,tMs:t*1000};
}

function getS(path) { return path.split('.').reduce((o,k)=>o?.[k],S); }
function setS(path, raw) {
  const parts=path.split('.'); let obj=S;
  for(let i=0;i<parts.length-1;i++) obj=obj[parts[i]];
  const k=parts[parts.length-1], cur=obj[k];
  if(typeof cur==='number') obj[k]=parseFloat(raw)||0;
  else if(typeof cur==='boolean') obj[k]=raw===true||raw==='true';
  else obj[k]=raw;
  persist(); render();
}

  const gapPresets = [{v:25,l:'MCC/Panel (25mm)'},{v:32,l:'LV Switchgear (32mm)'},{v:104,l:'5kV MV (104mm)'},{v:152,l:'15kV MV (152mm)'}];

    <div class="page-icon">⚠</div>

    <div class="page-sub">IEEE 1584-2002 simplified method — scoping estimates only</div></div>

  <div class="two-col" style="margin-top:1.25rem">
    <div class="stack">
      ${card('System Parameters',`
        <div class="stack">
          ${inp('arc.ibfKA','Available Bolted Fault Current',a.ibfKA,'kA',{min:.7,max:106,step:.1,hint:'0.7–106 kA'})}
          ${sel('arc.voltageKV','System Voltage',a.voltageKV,voltOpts)}
          ${sel('arc.config','Electrode Configuration',a.config,[{v:'box',l:'In Enclosure / Box (switchgear, MCC, panelboard)'},{v:'open',l:'Open Air / Bus (exposed conductors)'}])}
          ${tog('arc.grounded','Solidly Grounded System',a.grounded,'Uncheck for ungrounded or HRG systems')}
        </div>`)}
      ${card('Gap &amp; Working Distance',`
        <div class="stack">
          <div class="fg"><div class="lbl">Gap Presets</div>
            <div class="chips" style="margin-bottom:0">${gapPresets.map(it=>`
              <button class="chip chip-sm${a.gapMM==it.v?' active':''}" data-action="arc-gap" data-value="${it.v}">${it.l}</button>`).join('')}
            </div>
          </div>

          ${inp('arc.durationCycles','Arc Duration',a.durationCycles,'cycles',{min:.5,max:120,step:.5,hint:'1 cycle = 16.7 ms @ 60 Hz'})}

            <div class="chips" style="margin-bottom:0">${distPresets.map(it=>`
              <button class="chip chip-sm${a.workingDistanceIn==it.v?' active':''}" data-action="arc-dist" data-value="${it.v}">${it.l}</button>`).join('')}
            </div>
          </div>

      ${r&&pp?`

  </div>`;
}

         '12 cycles (200 ms) — Relay + breaker combination (MV)',
         '30 cycles (500 ms) — Short-time delay with coordination',
         '60+ cycles (≥1 s) — Over-fused or improperly coordinated systems',
      ].map(x=>`<div class="device-item"><span class="device-dot">▶</span>${x}</div>`).join('')}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// PAGE: SAVED
// ═══════════════════════════════════════════════════════════════════════

function pageSaved() {
  const saved = S.saved;
  const TYPE_BADGE = {
    'Transformer Fault Current':'amber','Cable Impedance & VD':'gray',
    'Motor Contribution':'gray','Arc Flash Incident Energy':'red'
  };
  const METRIC_COLORS = {amber:'amber',green:'green',red:'red'};

  function metricVal(v,col) { return `<div class="metric-val${col?' '+col:''}">${v}</div>`; }
  function metric(lbl,val,col) { return `<div class="metric"><div class="metric-lbl">${lbl}</div>${metricVal(val,col)}</div>`; }

  function metrics(c) {
    const {type:t,inputs:i,results:r} = c;
    if(t==='Transformer Fault Current') return `
      ${metric('kVA',i.kva,'')}${metric('Sec. Voltage',i.vSecondary+'V','')}
      ${metric('%Z',i.zPercent+'%','')}${metric('Fault Current',f2(r.iscKA)+' kA','amber')}`;
    if(t==='Cable Impedance & VD') {
      const lim=i.isFeeder?5:3,pass2=r.vdPct<=lim;
      return `${metric('Size',i.size,'')}${metric('Length',i.lengthFt+'ft','')}
        ${metric('Load',i.loadAmps+'A','')}${metric('VD%',f2(r.vdPct)+'%',pass2?'green':'red')}`;
    }
    if(t==='Motor Contribution') return `
      ${metric('HP',i.hp+' HP','')}${metric('Voltage',i.voltage+'V','')}
      ${metric('FLA',f(r.fla,1)+' A','')}${metric('Contrib.',f3(r.cKA)+' kA','amber')}`;
    if(t==='Arc Flash Incident Energy') return `
      ${metric('Fault',i.ibfKA+' kA','')}${metric('Voltage',(i.voltageKV*1000).toFixed(0)+'V','')}
      ${metric('Duration',i.durationCycles+' cyc','')}${metric('Energy',f2(r.E)+' cal/cm²',r.cat>=3?'red':'')}`;
    return '';
  }

  function detail(c) {
    const {inputs:i,results:r} = c;
    const iRows = Object.entries(i).map(([k,v])=>`<div class="saved-detail-row"><span class="saved-detail-key">${k}</span><span class="saved-detail-val">${v}</span></div>`).join('');
    const rRows = Object.entries(r).map(([k,v])=>`<div class="saved-detail-row"><span class="saved-detail-key">${k}</span><span class="saved-detail-val">${typeof v==='number'?f4(v):v}</span></div>`).join('');
    return `<div class="saved-detail"><div class="saved-detail-grid">
      <div><div class="saved-detail-section">Inputs</div>${iRows}</div>
      <div><div class="saved-detail-section">Results</div>${rRows}</div>
    </div></div>`;
  }

  const list = [...saved].reverse().map((c,ri)=>{
    const i = saved.length-1-ri;
    const d = new Date(c.timestamp);
    const bc = TYPE_BADGE[c.type]||'gray';
    const exp = S.ui.expanded[i];
    return `<div class="saved-card">
      <div class="saved-card-head">
        <div class="saved-card-meta">
          <span class="badge ${bc}">${c.type}</span>
          <span class="saved-card-date">${d.toLocaleDateString()} ${d.toLocaleTimeString()}</span>
        </div>
        <div class="saved-card-actions">
          <button class="btn-pdf" data-action="saved-pdf" data-idx="${i}">↓ PDF</button>
          <button class="btn-del" data-action="saved-del" data-idx="${i}">✕</button>
          <button class="btn-expand" data-action="saved-expand" data-idx="${i}">${exp?'▲':'▼'}</button>
        </div>
      </div>
      <div class="saved-metrics">${metrics(c)}</div>
      ${exp?detail(c):''}
    </div>`;
  }).join('');

  return `<div class="page-header"><div class="page-icon">📋</div>
    <div><div class="page-title">Saved Calculations</div>
    <div class="page-sub">Calculation history stored in browser localStorage</div></div></div>
  ${saved.length===0?`<div class="saved-empty"><div class="saved-empty-icon">📋</div>
    <div>No saved calculations yet.</div>
    <div style="font-size:.6875rem;margin-top:.25rem">Use the Save button in any calculator.</div>
  </div>`:`
    <div class="saved-top">
      <div class="saved-count">${saved.length} calculation${saved.length!==1?'s':''} saved</div>
      <button class="btn-del" data-action="saved-clear" style="font-size:.6875rem;border:none">Clear all</button>
    </div>
    ${list}`}`;
}

const NAV = [

    {id:'cable',lbl:'Cable Impedance & VD',ic:'🔌'},

  ]},
  {section:'Quick Reference',items:[
    {id:'ref-equipment',lbl:'Equipment Bus Ratings',ic:'🔲'},
    {id:'ref-ppe',lbl:'PPE Categories',ic:'🛡'},
    {id:'ref-approach',lbl:'Approach Boundaries',ic:'📏'},
    {id:'ref-protective',lbl:'Protective Device Times',ic:'⏱'},
  ]},
  {section:'History',items:[
    {id:'saved',lbl:'Saved Calculations',ic:'📋'},

function buildSidebar() {
  const navItems = NAV.map(group=>`
    <div class="sb-section" data-action="sb-section" data-section="${group.section}">${group.section}</div>
    ${group.items.map(it=>`
      <button class="sb-item${S.page===it.id?' active':''}" data-action="nav" data-page="${it.id}">
        <span class="ic">${it.ic}</span>
        <span>${it.lbl}</span>
        ${it.id==='saved'&&S.saved.length>0?`<span class="sb-badge">${S.saved.length}</span>`:''}
      </button>`).join('')}

  return `<div id="sidebar"${S.ui.sidebarOpen?' class="open"':''}>
    <div class="sb-logo">
      <div class="sb-icon">⚡</div>
      <div><div class="sb-name">ARC FLASH</div><div class="sb-sub">QUICK REFERENCE</div></div>
    </div>
    <nav class="sb-nav">${navItems}</nav>
    <div class="sb-foot">IEEE 1584 · NEC 2023<br>NFPA 70E 2021 · For reference only.</div>
  </div>`;

function buildPage() {
  switch(S.page) {
    case 'transformer':    return pageTransformer();
    case 'cable':          return pageCable();
    case 'motor':          return pageMotor();
    case 'arcflash':       return pageArc();
    case 'ref-equipment':  return pageRefEquipment();
    case 'ref-ppe':        return pageRefPPE();
    case 'ref-approach':   return pageRefApproach();
    case 'ref-protective': return pageRefDevice();
    case 'saved':          return pageSaved();
    default:               return pageTransformer();
  }
}

// PDF EXPORT

function printWindow(title, rows) {
  const w = window.open('','_blank','width=800,height=700');
  w.document.write(`<!doctype html><html><head><title>${title}</title><style>
    body{font-family:system-ui,sans-serif;background:#fff;color:#111;padding:2rem;max-width:700px;margin:0 auto}
    h1{color:#b45309;font-size:1.25rem;margin:0 0 .25rem;border-bottom:2px solid #f59e0b;padding-bottom:.5rem}
    .sub{color:#6b7280;font-size:.75rem;margin-bottom:1.5rem}
    table{width:100%;border-collapse:collapse;margin:1rem 0}
    th{text-align:left;font-size:.6875rem;text-transform:uppercase;letter-spacing:.06em;color:#6b7280;padding:.4rem .75rem;background:#f9fafb;border-bottom:1px solid #e5e7eb}
    td{padding:.4rem .75rem;border-bottom:1px solid #f3f4f6;font-size:.8125rem}
    td.val{font-family:monospace;font-weight:700;color:#b45309}
    .warn{background:#fffbeb;border:1px solid #fcd34d;padding:.75rem;border-radius:.375rem;font-size:.75rem;color:#92400e;margin-bottom:1.5rem}
    @media print{.no-print{display:none}}
  </style></head><body>
  <h1>⚡ ${title}</h1>
  <div class="sub">IEEE 1584 · NEC 2023 · NFPA 70E 2021 &nbsp;|&nbsp; Generated: ${new Date().toLocaleString()}</div>
  ${rows.map(r=>r.type==='warn'?`<div class="warn">⚠ ${r.text}</div>`:
    r.type==='head'?`<h2 style="font-size:.875rem;color:#374151;margin:.875rem 0 0;border-top:1px solid #e5e7eb;padding-top:.875rem">${r.text}</h2>`:
    `<table><tr><th style="width:60%">Parameter</th><th>Value</th><th>Unit</th></tr>
    ${r.rows.map(([l,v,u])=>`<tr><td>${l}</td><td class="val">${v}</td><td style="color:#9ca3af;font-size:.6875rem">${u||''}</td></tr>`).join('')}
    </table>`).join('')}
  <button class="no-print" onclick="window.print()" style="background:#f59e0b;border:none;padding:.5rem 1.5rem;border-radius:.375rem;cursor:pointer;font-weight:700;margin-top:1rem">
    Print / Save as PDF
  </button>
  </body></html>`);
  w.document.close();
}

function pdfXfmr() {
  const x=S.xfmr, r=calcXfmr(x);
  printWindow('Transformer Fault Current Calculation',[
    {type:'head',text:'Input Parameters'},
    {rows:[['kVA Rating',x.kva,'kVA'],['Primary Voltage',x.vPrimary,'V'],['Secondary Voltage',x.vSecondary,'V'],
      ['Impedance %Z',x.zPercent.toFixed(2),'%'],['Phase',x.phases+'-Phase',''],
      ...(x.useUtility?[['Utility Fault at Primary',x.utilityFaultKA.toFixed(2),'kA']]:[])]},
    {type:'head',text:'Results'},
    {rows:[['Primary FLA',f(r.flaP,1),'A'],['Secondary FLA',f(r.flaS,1),'A'],
      ['Fault Current (Infinite Bus)',f3(r.iscInfKA),'kA sym'],
      ...(r.iscUtilKA!=null?[['Fault Current (w/ Utility Z)',f3(r.iscUtilKA),'kA sym']]:[]),
      ['Design Fault Current',f2(r.iscKA),'kA sym']]},
  ]);
}

function pdfCable() {
  const c=S.cable, r=calcCable(c);
  if(!r) return;
  const lim=c.isFeeder?5:3, pass=r.vdPct<=lim;
  printWindow('Cable Impedance & Voltage Drop Calculation',[
    {type:'head',text:'Input Parameters'},
    {rows:[['Conductor Size',c.size,''],['Material',c.material,''],['Conduit Type',c.conduit,''],
      ['One-Way Length',c.lengthFt.toFixed(0),'ft'],['Load Current',c.loadAmps.toFixed(1),'A'],
      ['System Voltage',c.voltage.toFixed(0),'V'],['Power Factor',(c.pf*100).toFixed(0),'%'],
      ['Circuit Type',c.isFeeder?'Feeder (5% limit)':'Branch (3% limit)','']]},
    {type:'head',text:'Results'},
    {rows:[['R per 1000 ft',f4(r.ri),'Ω/1000ft'],['X per 1000 ft',f4(r.xi),'Ω/1000ft'],
      ['Total Resistance',f4(r.rT),'Ω'],['Total Reactance',f4(r.xT),'Ω'],
      ['Voltage Drop',f2(r.vdT),'V'],['Voltage Drop %',f2(r.vdPct),'%'],
      [`Result (limit: ${lim}%)`,pass?'PASS':'FAIL','']]},
  ]);
}

function pdfMotor() {
  const m=S.motor, r=calcMotor(m);
  const comb=m.includeBase&&m.baseFaultKA>0?{base:m.baseFaultKA,total:m.baseFaultKA+r.cKA}:null;
  printWindow('Motor Contribution Estimation',[
    {type:'head',text:'Input Parameters'},
    {rows:[['Motor Rating',m.hp,'HP'],['System Voltage',m.voltage,'V'],
      ['Efficiency',(m.efficiency*100).toFixed(0),'%'],['Power Factor',(m.pf*100).toFixed(0),'%'],
      ['Multiplier',m.multiplier+'×','']]},
    {type:'head',text:'Results'},
    {rows:[['Full Load Amps (FLA)',f(r.fla,1),'A'],['Contribution',f(r.cA,1),'A'],['Contribution',f3(r.cKA),'kA'],
      ...(comb?[['Base Fault',f3(comb.base),'kA'],['Combined Fault',f3(comb.total),'kA sym']]:[])]},
  ]);
}

function pdfArc() {
  const a=S.arc, r=calcArc(a);
  const cats=['Below Threshold','CAT 1','CAT 2','CAT 3','CAT 4','DANGEROUS'];
  printWindow('Arc Flash Incident Energy Calculation',[
    {type:'warn',text:'IEEE 1584-2002 Method — For Reference Only. Verify with site-specific arc flash study.'},
    {type:'head',text:'Input Parameters'},
    {rows:[['Bolted Fault Current',a.ibfKA.toFixed(3),'kA'],['System Voltage',(a.voltageKV*1000).toFixed(0),'V'],
      ['Conductor Gap',a.gapMM.toFixed(0),'mm'],['Arc Duration',a.durationCycles.toFixed(1),'cycles'],
      ['Working Distance',a.workingDistanceIn.toFixed(1),'in'],
      ['Configuration',a.config==='box'?'Enclosure (Box)':'Open Air',''],
      ['System Grounding',a.grounded?'Solidly Grounded':'Ungrounded/HRG','']]},
    {type:'head',text:'Results'},
    {rows:[['Arcing Current',f3(r.Ia),'kA'],['Incident Energy',f2(r.E),'cal/cm²'],
      ['Arc Flash Boundary',f(r.afbFt,1),'ft'],['Arc Flash Boundary',f(r.afbIn,1),'in'],
      ['PPE Category',cats[Math.min(r.cat,5)],''],
      ['Arc Duration',f(r.tMs,1),'ms']]},
  ]);
}

// ═══════════════════════════════════════════════════════════════════════
// EVENT DELEGATION
// ═══════════════════════════════════════════════════════════════════════

document.addEventListener('input', e => {
  const path = e.target.dataset.bind;
  if (!path) return;
  const val = e.target.type==='checkbox' ? e.target.checked : e.target.value;
  setS(path, val);
});

document.addEventListener('change', e => {
  const path = e.target.dataset.bind;
  if (!path) return;
  const val = e.target.type==='checkbox' ? e.target.checked : e.target.value;
  setS(path, val);
});

document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const {action, page, value, path, idx, section} = el.dataset;

  switch(action) {
    case 'nav':
      S.page = page;
      closeSidebar();
      render(); break;
    case 'toggle':
      setS(path, !getS(path)); break;
    case 'xfmr-kva':
      setS('xfmr.kva', parseFloat(value)); break;
    case 'motor-hp':
      setS('motor.hp', parseFloat(value)); break;
    case 'arc-gap':
      setS('arc.gapMM', parseFloat(value)); break;
    case 'arc-dist':
      setS('arc.workingDistanceIn', parseFloat(value)); break;
    case 'save-xfmr': {
      const x=S.xfmr, r=calcXfmr(x);
      S.saved.push({type:'Transformer Fault Current',inputs:{...x},results:{flaS:r.flaS,flaP:r.flaP,iscInfKA:r.iscInfKA,iscUtilKA:r.iscUtilKA,iscKA:r.iscKA},timestamp:Date.now()});
      persist(); render(); break; }
    case 'save-cable': {
      const c=S.cable, r=calcCable(c);
      if(r) { S.saved.push({type:'Cable Impedance & VD',inputs:{...c},results:{ri:r.ri,xi:r.xi,rT:r.rT,xT:r.xT,zT:r.zT,vdT:r.vdT,vdPct:r.vdPct},timestamp:Date.now()}); persist(); render(); }
      break; }
    case 'save-motor': {
      const m=S.motor, r=calcMotor(m);
      S.saved.push({type:'Motor Contribution',inputs:{...m},results:{fla:r.fla,cA:r.cA,cKA:r.cKA},timestamp:Date.now()});
      persist(); render(); break; }
    case 'save-arc': {
      const a=S.arc;
      if(a.ibfKA>=.7&&a.ibfKA<=106) {
        const r=calcArc(a);
        S.saved.push({type:'Arc Flash Incident Energy',inputs:{...a},results:{Ia:r.Ia,E:r.E,afbFt:r.afbFt,afbIn:r.afbIn,cat:r.cat},timestamp:Date.now()});
        persist(); render(); }
      break; }
    case 'pdf-xfmr': pdfXfmr(); break;
    case 'pdf-cable': pdfCable(); break;
    case 'pdf-motor': pdfMotor(); break;
    case 'pdf-arc': pdfArc(); break;
    case 'saved-pdf': {
      const c = S.saved[parseInt(idx)];
      if(!c) break;
      const {type:t} = c;
      // Temporarily set state to saved values, export, then restore
      const oldPage = S.page;
      if(t==='Transformer Fault Current'){Object.assign(S.xfmr,c.inputs);pdfXfmr();}
      else if(t==='Cable Impedance & VD'){Object.assign(S.cable,c.inputs);pdfCable();}
      else if(t==='Motor Contribution'){Object.assign(S.motor,c.inputs);pdfMotor();}
      else if(t==='Arc Flash Incident Energy'){Object.assign(S.arc,c.inputs);pdfArc();}
      break; }
    case 'saved-del': {
      const i2=parseInt(idx);
      if(confirm('Delete this calculation?')) {
        S.saved.splice(i2,1); delete S.ui.expanded[i2]; persist(); render(); }
      break; }
    case 'saved-expand': {
      const i3=parseInt(idx);
      S.ui.expanded[i3] = !S.ui.expanded[i3];
      render(); break; }
    case 'saved-clear':
      if(confirm('Delete all saved calculations?')) { S.saved=[]; S.ui.expanded={}; persist(); render(); }
      break;
  }
});

function closeSidebar() {
  S.ui.sidebarOpen = false;
  document.getElementById('overlay').classList.remove('show');
  const sb = document.getElementById('sidebar');
  if(sb) sb.classList.remove('open');
}

// Hamburger
document.addEventListener('click', e => {
  if(e.target.closest('#hamburger')) {
    S.ui.sidebarOpen = !S.ui.sidebarOpen;
    document.getElementById('overlay').classList.toggle('show', S.ui.sidebarOpen);
    const sb = document.getElementById('sidebar');
    if(sb) sb.classList.toggle('open', S.ui.sidebarOpen);
  }
});

// ═══════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════

function render() {
  const focusId = document.activeElement?.id || document.activeElement?.dataset?.bind;
  const mainEl = document.getElementById('main');
  const scrollY = mainEl?.scrollTop || 0;

  document.getElementById('app').innerHTML = `
    ${buildSidebar()}
    <div id="wrapper">
      <div id="topbar">
        <button id="hamburger" class="ham">☰</button>
        <div class="tb-status">
          <div class="tb-dot"></div>
          <span>IEEE 1584 &middot; NEC 2023 &middot; NFPA 70E 2021</span>
        </div>
        <div class="tb-right">${S.saved.length>0?S.saved.length+' saved':'No saved calcs'}</div>
      </div>
      <div id="main">${buildPage()}</div>
    </div>`;

  // Restore scroll
  const newMain = document.getElementById('main');
  if(newMain && scrollY) newMain.scrollTop = scrollY;

  // Restore focus by data-bind path
  if(focusId) {
    const el = document.querySelector(`[data-bind="${focusId}"]`) || document.getElementById(focusId);
    if(el) { el.focus(); if(el.select) el.select(); }
  }
}

loadState();

const phases = ['Loading IEEE 1584 tables...','Importing NEC conductor data...','Building calculator engine...','Rendering reference tables...','Ready'];
const barVals = [20, 45, 70, 90, 100];
let pi = 0;

const loadInterval = setInterval(() => {
  if(pi < phases.length) {
    document.getElementById('load-phase').textContent = phases[pi];
    document.getElementById('load-bar').style.width = barVals[pi] + '%';
    pi++;
  } else {
    clearInterval(loadInterval);
    setTimeout(() => {
      const loading = document.getElementById('loading');
      loading.style.opacity = '0';
      setTimeout(() => {
        loading.remove();
        const app = document.getElementById('app');
        app.style.display = 'flex';
        render();
      }, 300);
    }, 200);
  }
}, 280);
</script>
